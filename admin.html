<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Modern Savage - Applicants</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#14140f;color:#efece3;line-height:1.5}
  header{padding:20px 26px;border-bottom:1px solid #33322a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  h1{font-size:18px;letter-spacing:1px;font-weight:800}h1 span{color:#7a9a4e}
  .count{color:#c2894b;font-weight:800}
  .gate{max-width:420px;margin:12vh auto;padding:0 24px;text-align:center}
  .gate h2{font-size:22px;margin-bottom:8px}.gate p{color:#a7a394;margin-bottom:20px}
  input{width:100%;padding:13px 15px;border:1px solid #3c3a30;border-radius:9px;background:#1d1c15;color:#efece3;font-size:16px}
  button{padding:12px 18px;border:none;border-radius:9px;background:#7a9a4e;color:#12130d;font-weight:800;font-size:15px;cursor:pointer;margin-top:12px}
  button:hover{background:#89ab59}
  .exp{background:#c2894b;color:#1a1206;text-decoration:none;padding:8px 14px;border-radius:7px;font-weight:700;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td,th{padding:12px 16px;border-bottom:1px solid #2a2921;text-align:left;vertical-align:top}
  th{color:#8f8b7c;font-size:12px;text-transform:uppercase;letter-spacing:1px}
  .ts{color:#8f8b7c;white-space:nowrap}.note{max-width:440px;color:#d4d0c4}
  .btn{color:#c2894b;border:1px solid #c2894b;border-radius:6px;padding:5px 10px;text-decoration:none;font-size:12px;white-space:nowrap}
  a{color:#c2894b}.err{color:#e08a5a;margin-top:12px}.empty{text-align:center;color:#8f8b7c;padding:44px}
  .wrap{padding:0}
</style>
</head>
<body>
  <div id="gate" class="gate">
    <h2>Modern Savage - Applicants</h2>
    <p>Enter the access token to review applications.</p>
    <input type="password" id="token" placeholder="Access token" autocomplete="off">
    <button id="go">View applicants</button>
    <div class="err" id="gateErr"></div>
  </div>

  <div id="app" style="display:none">
    <header>
      <h1>MODERN <span>SAVAGE</span> &nbsp;-&nbsp; APPLICANTS <span class="count" id="count"></span></h1>
      <div><a class="exp" id="csv" href="#">Export CSV</a> &nbsp; <a href="#" id="logout" style="font-size:13px">Lock</a></div>
    </header>
    <div class="wrap"><table>
      <thead><tr><th>Received</th><th>Name</th><th>Email</th><th>CV</th><th>Personal note</th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
  </div>

<script>
  // Backend root (auto-repointed by the supervisor if the tunnel address changes).
  const BACKEND = "https://westminster-test-genius-joe.trycloudflare.com/apply";
  const ROOT = BACKEND.replace(/\/apply$/, "");
  const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  const gate=document.getElementById('gate'), appv=document.getElementById('app');
  function show(tok){
    fetch(ROOT + "/admin.json?token=" + encodeURIComponent(tok))
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => {
        sessionStorage.setItem('ms_tok', tok);
        gate.style.display='none'; appv.style.display='block';
        document.getElementById('count').textContent = "(" + d.count + ")";
        document.getElementById('csv').href = ROOT + "/admin/export.csv?token=" + encodeURIComponent(tok);
        const rows = d.applications.map(a => `<tr>
          <td class="ts">${esc(a.received)}</td>
          <td><b>${esc(a.name)}</b></td>
          <td><a href="mailto:${esc(a.email)}">${esc(a.email)}</a></td>
          <td><a class="btn" href="${ROOT}/cv/${encodeURIComponent(a.id)}?token=${encodeURIComponent(tok)}">Download CV</a></td>
          <td class="note">${esc(a.note).replace(/\n/g,'<br>')}</td></tr>`).join("");
        document.getElementById('rows').innerHTML = rows || '<tr><td colspan="5" class="empty">No applications yet.</td></tr>';
      })
      .catch(e => { document.getElementById('gateErr').textContent = (e===403) ? "Wrong token." : "Could not reach the backend. Try again shortly."; });
  }
  document.getElementById('go').onclick = () => show(document.getElementById('token').value.trim());
  document.getElementById('token').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('go').click(); });
  document.getElementById('logout').onclick = (e) => { e.preventDefault(); sessionStorage.removeItem('ms_tok'); location.reload(); };
  const saved = sessionStorage.getItem('ms_tok'); if (saved) show(saved);
</script>
</body>
</html>
